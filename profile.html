<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Karani — Client Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet" />
<style>
  :root{ --cream:#FBF7EF; --ink:#132630; --terra:#CE8168; --blue:#6F93AC; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{ background:var(--cream); color:var(--ink); font-family:'Jost',system-ui,sans-serif;
        display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
  .orb{ position:absolute; border-radius:50%; filter:blur(70px); opacity:.5; }
  .a{ width:46vmax;height:46vmax;left:-12vmax;top:-14vmax;
      background:radial-gradient(circle at 30% 30%,var(--terra),rgba(206,129,104,0)); animation:drA 26s ease-in-out infinite; }
  .b{ width:40vmax;height:40vmax;right:-12vmax;bottom:-12vmax;
      background:radial-gradient(circle at 60% 60%,var(--blue),rgba(111,147,172,0)); animation:drB 32s ease-in-out infinite; }
  .grid{ position:absolute; inset:0;
      background-image:linear-gradient(rgba(19,38,48,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(19,38,48,.05) 1px,transparent 1px);
      background-size:44px 44px; -webkit-mask-image:radial-gradient(circle at 50% 45%,#000 30%,transparent 78%);
      mask-image:radial-gradient(circle at 50% 45%,#000 30%,transparent 78%); }
  .card{ position:relative; z-index:1; text-align:center; }
  .word{ font-weight:700; font-size:2.4rem; letter-spacing:-.02em; }
  .word span{ color:var(--terra); }
  .eyebrow{ margin-top:.6rem; font-family:'Space Mono',monospace; font-size:.72rem;
      letter-spacing:.24em; text-transform:uppercase; color:rgba(19,38,48,.55); }
  .spin{ margin:1.6rem auto 0; width:26px; height:26px; border:2px solid rgba(19,38,48,.15);
      border-top-color:var(--terra); border-radius:50%; animation:sp .8s linear infinite; }
  .fallback{ margin-top:1.3rem; font-family:'Space Mono',monospace; font-size:.72rem; color:rgba(19,38,48,.5); }
  .fallback a{ color:var(--terra); }
  @keyframes drA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6vmax,4vmax) scale(1.08)}}
  @keyframes drB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vmax,-4vmax) scale(1.1)}}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){ .orb,.spin{ animation:none } }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"><span class="orb a"></span><span class="orb b"></span><div class="grid"></div></div>
  <div class="card">
    <div class="word">Karani<span>.</span></div>
    <div class="eyebrow">Client Access</div>
    <div class="spin" role="status" aria-label="Connecting"></div>
    <div class="fallback">Opening secure sign in… <a id="manual" href="https://app.karanimarkets.com/sign-in">continue&nbsp;&rarr;</a></div>
  </div>
<script>
  // Route STRAIGHT to the branded Clerk sign-in (no landing page in between).
  // Prefer the custom domain; fall back to the Railway URL until its TLS cert
  // finishes issuing (a cert-not-ready host makes fetch() reject = our signal).
  var CUSTOM="https://app.karanimarkets.com/", FALLBACK="https://app-production-8dc0.up.railway.app/", PATH="sign-in";
  var done=false;
  function go(base){ if(done)return; done=true; location.replace(base+PATH); }
  document.getElementById('manual').setAttribute('href', CUSTOM+PATH);
  var t=setTimeout(function(){ go(FALLBACK); }, 3000);
  try{
    fetch(CUSTOM+"api/health",{mode:"no-cors",cache:"no-store"})
      .then(function(){ clearTimeout(t); go(CUSTOM); })
      .catch(function(){ clearTimeout(t); go(FALLBACK); });
  }catch(e){ clearTimeout(t); go(FALLBACK); }
</script>
</body>
</html>
